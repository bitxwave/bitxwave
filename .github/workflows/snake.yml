name: Generate Snake Animation

on:
  schedule:
    - cron: "17 */6 * * *"   # 每 6 小时一次，避开 :00 整点
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: bitxwave
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#00ff41&color_dots=#0d1117,#003b1d,#00913f,#00cc55,#00ff41
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#00ff41&color_dots=#0d1117,#003b1d,#00913f,#00cc55,#00ff41

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
